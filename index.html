<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Practicantes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f3f4f6; color: #1f2937; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; max-width: 480px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        h2 { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 24px; color: #111827; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #4b5563; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; transition: border-color 0.2s; background-color: #f9fafb; }
        input:focus { outline: none; border-color: #2563eb; background-color: white; }
        input[type="file"] { padding: 8px; font-size: 14px; background: white; cursor: pointer; }
        button { background-color: #2563eb; color: white; padding: 12px; border: none; cursor: pointer; width: 100%; border-radius: 6px; font-size: 16px; font-weight: 600; transition: background-color 0.2s; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        .link-container { text-align: center; margin-top: 20px; }
        .link-container a { color: #2563eb; text-decoration: none; font-size: 14px; font-weight: 500; }
        .link-container a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Formulario de Inscripción</h2>
        <form id="registroForm">
            <div class="form-group"><label>Nombre Completo *</label><input type="text" name="nombre" placeholder="Ej. Diego Chicaiza" required></div>
            <div class="form-group"><label>Correo Electrónico *</label><input type="email" name="email" placeholder="ejemplo@correo.com" required></div>
            <div class="form-group"><label>Carrera *</label><input type="text" name="carrera" placeholder="Ej. Ingeniería de Sistemas" required></div>
            <div class="form-group"><label>Semestre *</label><input type="number" name="semestre" min="1" max="10" placeholder="#" required></div>
            <div class="form-group"><label>Hoja de Vida (PDF) *</label><input type="file" name="hojaDeVida" accept="application/pdf" required></div>
            <button type="submit">Enviar Postulación</button>
        </form>
        <div class="link-container">
            <a href="analista.html">Ir al Panel de Analista →</a>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/api/practicantes', { method: 'POST', body: formData });
            if (response.ok) { alert('¡Postulación enviada con éxito!'); e.target.reset(); }
            else { alert('Error al enviar los datos.'); }
        });
    </script>
</body>
</html>
